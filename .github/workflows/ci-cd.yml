name: CI/CD

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Run production deploy"
        required: true
        default: false
        type: boolean

jobs:
  ci:
    name: Build And Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify backend imports
        run: |
          python -m py_compile \
            backend/app.py \
            backend/wsgi.py \
            backend/services/campaign_service.py \
            backend/utils/campaign_logs.py

      - name: Run database migration
        run: python -m backend.migrate

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production == true
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          envs: DEPLOY_BRANCH,DEPLOY_PATH
          script: |
            set -euo pipefail
            bash "$DEPLOY_PATH/deploy/remote_update.sh"
